server {
    listen 80;
    server_name pitch.billyrovzar.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pitch.billyrovzar.com;

    ssl_certificate /etc/letsencrypt/live/pitch.billyrovzar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pitch.billyrovzar.com/privkey.pem;

    root /var/www/lemon-pitch-pwa;
    index index.html;

    # Service worker must not be cached
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # Workbox runtime
    location ~* \.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Assets with content hash — cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/manifest+json";
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
